name: Scrape Canton Featured Apps

on:
  schedule:
    # Run every hour at minute 0
    - cron: '0 * * * *'
  push:
    branches: [main]
    paths:
      - '.github/workflows/scrape.yml'
      - 'scrape_featured_apps.py'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

# Đã xóa phần env: FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 vì không còn cần thiết

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6 # Nâng cấp từ v4 lên v6

      - name: Set up Python
        uses: actions/setup-python@v6 # Nâng cấp từ v5 lên v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        run: python scrape_featured_apps.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet featured_apps.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit & Push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add featured_apps.json featured_apps.csv
          git commit -m "chore: auto-update featured apps data ($(date -u '+%Y-%m-%d %H:%M UTC'))"
          git push
