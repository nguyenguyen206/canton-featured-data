name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_run:
    workflows: ["Scrape Canton Featured Apps"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

# Đã xóa phần env: FORCE_JAVASCRIPT_ACTIONS_TO_NODE24

jobs:
  deploy:
    # Only deploy on push OR when scrape completed successfully
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6 # Nâng cấp lên v6

      - name: Setup Pages
        uses: actions/configure-pages@v5 # Có thể giữ nguyên v5 hoặc nâng lên bản mới nhất nếu có

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4 # Nâng cấp từ v3 lên v4 (hoặc mới hơn)
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5 # Nâng cấp từ v4 lên v5 (hoặc mới hơn)
